syntax = "proto3";

// MujocoSceneService — engine-wide, low-level MuJoCo access.
//
// Unlike `MujocoService` (in hazel_rpc.proto), which is scoped to the joints
// and actuators that a registered `RobotAgent` has declared, this service
// exposes the *entire* loaded mjModel/mjData. Use it to:
//   - Enumerate every joint, actuator, and their limits/types
//   - Read the complete qpos / qvel / ctrl vectors
//   - Drive arbitrary actuators by index or by name
//
// Safety: write RPCs refuse to clobber actuators that are currently owned by
// an active external RL agent (SetControl returns FAILED_PRECONDITION). Reads
// are always safe. See `MujocoSceneServiceImpl.cs` for the gating rules.

package hazel.rpc;

option cc_enable_arenas = true;

// =============================================================================
// Model introspection
// =============================================================================

enum MjJointType {
    MJ_JNT_FREE   = 0;   // 6 DOF free joint
    MJ_JNT_BALL   = 1;   // 3 DOF ball
    MJ_JNT_SLIDE  = 2;   // 1 DOF prismatic
    MJ_JNT_HINGE  = 3;   // 1 DOF revolute
    MJ_JNT_UNKNOWN = 99;
}

message JointDescriptor {
    uint32 index = 1;                 // mjModel joint index [0, njnt)
    string name = 2;                  // may be empty for unnamed joints
    MjJointType type = 3;
    uint32 qpos_adr = 4;              // offset into qpos
    uint32 qvel_adr = 5;              // offset into qvel (a.k.a. dof_adr)
    bool limited = 6;                 // true iff range is meaningful
    float range_lo = 7;
    float range_hi = 8;

    // Ownership (populated by GetModelInfo). 0 when no slot claims it.
    uint32 claimed_by_policy_slot_id = 9;
    // True when the joint is driven by an actuator in the current external
    // RL-agent batch's claimed set.
    bool claimed_by_rl_agent = 10;
}

message ActuatorDescriptor {
    uint32 index = 1;                 // mjModel actuator index [0, nu)
    string name = 2;
    bool ctrl_limited = 3;
    float ctrl_range_lo = 4;
    float ctrl_range_hi = 5;
    int32 target_joint_index = 6;     // -1 if actuator is not joint-transmitted

    // Ownership (populated by GetModelInfo).
    // 0 when no active PolicySlot claims this actuator's target joint.
    //
    // NOTE: only populated for joint-transmitted actuators (mjTRN_JOINT /
    // mjTRN_JOINTINPARENT). Tendon-, site-, and body-transmitted actuators
    // always report 0 here even if a policy could indirectly influence them
    // through the joints they cascade onto. The same caveat applies to the
    // SetControl safety gate (`IsActuatorClaimedByPolicy`) — a tendon-driven
    // actuator is NOT auto-rejected by SetControl. Manage at the joint level
    // via SetPolicyDrivenJoints if you need that gating.
    uint32 claimed_by_policy_slot_id = 7;
    // True when this actuator's index is in the external-RL-agent owned set.
    // Same transmission-type caveat as `claimed_by_policy_slot_id`.
    bool claimed_by_rl_agent = 8;
}

message GetModelInfoRequest {
}

message GetModelInfoResponse {
    bool success = 1;
    string message = 2;
    uint32 nq = 3;
    uint32 nv = 4;
    uint32 nu = 5;
    uint32 njnt = 6;
    repeated JointDescriptor joints = 7;
    repeated ActuatorDescriptor actuators = 8;
}

// =============================================================================
// Full state
// =============================================================================

message FullState {
    repeated float qpos = 1 [packed = true];
    repeated float qvel = 2 [packed = true];
    repeated float ctrl = 3 [packed = true];
    double time = 4;
    uint64 frame_number = 5;
}

message GetFullStateRequest {
    bool include_qpos = 1;            // default (all false) behaves as all-true
    bool include_qvel = 2;
    bool include_ctrl = 3;

    // Optional joint/actuator filters applied BEFORE the qpos/qvel/ctrl arrays
    // are populated. All filters are OR-ed — a joint is included if any filter
    // matches. Leaving all filters unset disables filtering (every index is
    // included), which is the default.
    StateFilter filter = 4;
}

message GetFullStateResponse {
    bool success = 1;
    string message = 2;
    FullState state = 3;

    // When a filter is active, these lists map positions in the returned
    // qpos / qvel / ctrl arrays back to the original mjModel indices. Empty
    // when no filter was applied.
    repeated uint32 included_joint_indices = 4;
    repeated uint32 included_actuator_indices = 5;
}

message StreamFullStateRequest {
    // Desired frame rate (Hz). 0 = server default (~30 Hz).
    uint32 target_fps = 1;
    bool include_qpos = 2;
    bool include_qvel = 3;
    bool include_ctrl = 4;

    // Same filter semantics as GetFullStateRequest.filter.
    StateFilter filter = 5;
}

// Optional filter that narrows GetFullState / StreamFullState output to a
// subset of joints and actuators. Leaving all fields at their defaults means
// "include everything" (backwards-compatible).
message StateFilter {
    // Only include joints currently claimed by an active PolicySlot on any
    // RobotControllerComponent in the scene (via DrivenJoints mask).
    bool include_only_policy_claimed_joints = 1;

    // Only include joints that are NOT claimed by any active PolicySlot or
    // external RL agent — useful for observing unbound env props + motion-
    // graph-driven joints.
    bool include_only_unclaimed_joints = 2;

    // Narrow to the joints a specific PolicySlot claims. 0 = disabled.
    uint32 filter_by_slot_id = 3;
}

// =============================================================================
// Control
// =============================================================================

message NamedControlEntry {
    string actuator_name = 1;
    float value = 2;
}

message IndexedControlEntry {
    uint32 actuator_index = 1;
    float value = 2;
}

// A SetControl call has three mutually-compatible payloads. The engine
// applies them in the order: bulk → indexed → named, so later entries
// override earlier ones if they target the same actuator.
//
// Write semantics per actuator:
//   * If the actuator is currently claimed by an active RL agent or by an
//     active PolicySlot on the entity, the write is REJECTED and the actuator
//     name appears in `rejected_actuators`. These two surfaces take
//     authoritative control over their joints and a silent passthrough would
//     be a debug footgun.
//   * If the actuator is driven by an active MotionGraph, the write lands in
//     mjData.ctrl[i] but the next RecalculateControls tick will overwrite it
//     with the graph-synthesized value. This is intentional — it lets you
//     "nudge" a graph-driven joint for a sub-tick. For a persistent write,
//     call SetMotionGraphActive(entity, false) first (so the graph stops
//     synthesising ctrl each tick), then SetControl.
//   * Otherwise the write is applied immediately.
message SetControlRequest {
    // Full-length control vector (clamped to nu). Entries past nu are ignored.
    repeated float bulk = 1 [packed = true];
    repeated IndexedControlEntry indexed = 2;
    repeated NamedControlEntry named = 3;

    // If true, the call blocks until the next physics step begins consuming
    // the ctrl vector (lock-step write). Default is non-blocking.
    bool wait_for_next_step = 4;

    // If true, values are passed through as-is. If false (default), values
    // outside the actuator ctrl range are clamped before being written.
    bool skip_range_clamp = 5;
}

message SetControlResponse {
    bool success = 1;
    string message = 2;
    uint32 actuators_written = 3;
    // Names of actuators whose write was rejected because they are currently
    // claimed by an active RL agent or PolicySlot. Motion-graph-driven
    // actuators are NOT in this list — they accept the write but the graph
    // will overwrite it on the next tick (see SetControlRequest docstring).
    repeated string rejected_actuators = 4;
}

// =============================================================================
// qpos teleport (editor / reset helpers)
// =============================================================================

message IndexedQposEntry {
    uint32 qpos_index = 1;
    float value = 2;
}

message SetQposRequest {
    repeated float bulk = 1 [packed = true];
    repeated IndexedQposEntry indexed = 2;

    // Set true to allow writes even when an external agent is connected.
    // DANGEROUS: teleporting qpos mid-episode will corrupt training data.
    bool force = 3;

    // If true, SKIP the automatic reseed of active PolicyRuntimes that
    // normally follows the qpos write. Default behaviour is to reseed (so PD
    // targets re-sync to the new qpos and policies don't yank the robot back
    // on the next tick). Only set this when you deliberately want the yank —
    // e.g. diagnosing what the PD recovery looks like.
    bool skip_policy_reseed = 4;
}

message SetQposResponse {
    bool success = 1;
    string message = 2;
    uint32 values_written = 3;
}

// =============================================================================
// Actuator gain inspection
// =============================================================================

message ActuatorGainInfo {
    uint32 actuator_index = 1;
    string actuator_name = 2;
    // model->actuator_gainprm[idx * mjNGAIN + 0]. Zeroed by
    // NeutralizeActuatorsForTorquePolicy on PolicySlot-claimed actuators each
    // substep, and restored to the original XML value when unclaimed.
    float gain_prm_0 = 3;
    // model->actuator_biasprm[idx * mjNBIAS + 0]. Similar treatment.
    float bias_prm_0 = 4;
    // Convenience: true when gain_prm_0 is within 1e-6 of zero (the sentinel
    // value used by NeutralizeActuatorsForTorquePolicy on claimed actuators).
    bool neutralized = 5;
}

message GetActuatorGainsRequest {}

message GetActuatorGainsResponse {
    bool success = 1;
    string message = 2;
    repeated ActuatorGainInfo actuators = 3;
}

// =============================================================================
// Service
// =============================================================================

service MujocoSceneService {
    rpc GetModelInfo(GetModelInfoRequest) returns (GetModelInfoResponse);

    rpc GetFullState(GetFullStateRequest) returns (GetFullStateResponse);
    rpc StreamFullState(StreamFullStateRequest) returns (stream GetFullStateResponse);

    rpc SetControl(SetControlRequest) returns (SetControlResponse);
    rpc SetQpos(SetQposRequest) returns (SetQposResponse);

    // Live actuator gainprm/biasprm inspection for verifying
    // NeutralizeActuatorsForTorquePolicy's zero/restore cycle.
    rpc GetActuatorGains(GetActuatorGainsRequest) returns (GetActuatorGainsResponse);
}
