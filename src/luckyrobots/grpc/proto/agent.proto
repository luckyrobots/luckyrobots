syntax = "proto3";

// Agent + observation service definitions for the LuckyEngine / Hazel ScriptCore gRPC API (v1).

package hazel.rpc;

option cc_enable_arenas = true;

import "common.proto";
import "media.proto";
import "mujoco.proto";
import "telemetry.proto";

// Schema for an RL-style agent. `*_names` are informative; sizes are authoritative.
message AgentSchema {
    string agent_name = 1;
    repeated string observation_names = 2;
    repeated string action_names = 3;
    uint32 observation_size = 4;
    uint32 action_size = 5;
}

message GetAgentSchemaRequest {
    // Agent logical name. Convention in this repo is `agent_0`, `agent_1`, ...
    // Empty typically means "default agent".
    string agent_name = 1;
}

message GetAgentSchemaResponse {
    AgentSchema schema = 1;
}

message StreamAgentRequest {
    // Agent logical name. If empty, server may fall back to a default agent.
    string agent_name = 1;
    // Client hint: desired update rate. Server may clamp.
    uint32 target_fps = 2;
}

// Simulation contract between luckylab and LuckyEngine.
// Defines domain randomization, command ranges, and other shared parameters.
// All range fields are [min, max] pairs. Empty ranges mean "use defaults".
message SimulationContract {
    // Initial state randomization
    repeated float pose_position_noise = 1;   // [x, y, z] position noise std
    float pose_orientation_noise = 2;         // Orientation noise std (radians)
    float joint_position_noise = 3;           // Joint position noise std
    float joint_velocity_noise = 4;           // Joint velocity noise std

    // Physics parameters (all [min, max] ranges)
    repeated float friction_range = 5;        // Surface friction coefficient
    repeated float restitution_range = 6;     // Bounce/restitution coefficient
    repeated float mass_scale_range = 7;      // Body mass multiplier
    repeated float com_offset_range = 8;      // Center of mass offset

    // Motor/actuator randomization
    repeated float motor_strength_range = 9;  // Motor strength multiplier
    repeated float motor_offset_range = 10;   // Motor position offset

    // External disturbances
    repeated float push_interval_range = 11;  // Time between pushes [min, max]
    repeated float push_velocity_range = 12;  // Push velocity magnitude [min, max]

    // Terrain configuration
    string terrain_type = 13;                 // Terrain type identifier
    float terrain_difficulty = 14;            // Terrain difficulty level

    // Velocity command ranges (sampled by engine, returned in observation vector)
    repeated float vel_command_x_range = 15;              // [min, max] m/s
    repeated float vel_command_y_range = 16;              // [min, max] m/s
    repeated float vel_command_yaw_range = 17;            // [min, max] rad/s
    repeated float vel_command_resampling_time_range = 18; // [min, max] seconds
    float vel_command_standing_probability = 19;           // probability [0, 1]
}

message ResetAgentRequest {
    // Agent logical name. Convention in this repo is `agent_0`, `agent_1`, ...
    // Empty typically means "default agent" (agent_0).
    string agent_name = 1;

    // Optional simulation contract for this reset.
    // If not provided, use defaults or keep previous values.
    SimulationContract simulation_contract = 2;
}

message ResetAgentResponse {
    bool success = 1;
    string message = 2;
}

// Agent observation stream frame.
// This stream is server->client; external actions are currently sent via MujocoService.SendControl.
message AgentFrame {
    // Wall-clock timestamp in milliseconds (set by server on outgoing frames)
    uint64 timestamp_ms = 1;
    // Monotonic frame counter (set by server on outgoing frames)
    uint32 frame_number = 2;

    // Flat observation vector for this frame, as defined by the Agent's ObservationSpec.
    repeated float observations = 3;

    // Flat action vector for this frame.
    // For frames sent from the client to the server, this carries the actions that
    // should be applied for the next simulation step.
    // For frames sent from the server to the client, this typically mirrors the last
    // applied actions for debugging/telemetry.
    repeated float actions = 4;

    // Optional agent identifier, used when multiplexing multiple agents over a single
    // stream. If empty, the server may fall back to a default agent.
    string agent_name = 5;

    // Optional target FPS hint requested by the client. The server may clamp or ignore
    // this value depending on simulation timing constraints.
    uint32 target_fps = 6;
}

// =============================================================================
// Observation RPC (single-shot snapshot)
// =============================================================================

// Single-shot camera snapshot request (mirrors StreamCameraRequest without fps).
message GetCameraFrameRequest {
    oneof identifier {
        EntityId id = 1;
        string name = 2;
    }

    uint32 width = 3;            // Desired width (0 = native)
    uint32 height = 4;           // Desired height (0 = native)
    string format = 5;           // "raw", "jpeg" (default: raw)
}

// Single-shot viewport snapshot request (mirrors StartViewportStreamRequest without fps).
message GetViewportFrameRequest {
    string viewport_name = 1;
    uint32 width = 2;            // Desired width (0 = native)
    uint32 height = 3;           // Desired height (0 = native)
    string format = 4;           // "raw", "jpeg" (default: raw)
}

// Request a unified observation snapshot. The server decides the exact meaning of
// "observation" based on the active scene/agent configuration and the fields selected here.
message GetObservationRequest {
    // Target robot (used for MujocoService-style state and external actions).
    string robot_name = 1;

    // Target agent (used for RL-style flattened observation vectors). Empty means default agent.
    string agent_name = 2;

    // Include components in the response (server may ignore unsupported fields).
    bool include_joint_state = 3;
    bool include_agent_frame = 4;
    bool include_telemetry = 5;

    // Optional image snapshots.
    repeated GetCameraFrameRequest cameras = 6;
    repeated GetViewportFrameRequest viewports = 7;
}

message GetObservationResponse {
    bool success = 1;
    string message = 2;

    // Timestamp/frame_number are best-effort; server may use whichever timing source is available.
    uint64 timestamp_ms = 3;
    uint32 frame_number = 4;

    // Optional components.
    JointState joint_state = 5;
    AgentFrame agent_frame = 6;
    TelemetryFrame telemetry = 7;

    repeated NamedImageFrame camera_frames = 8;
    repeated NamedImageFrame viewport_frames = 9;
}

// =============================================================================
// Step RPC (synchronous RL step)
// =============================================================================

// Request to step the simulation with the provided action.
// This is the recommended interface for RL training - it combines
// SendControl + physics step + GetObservation into a single RPC.
message StepRequest {
    // Agent logical name. Empty means default agent.
    string agent_name = 1;
    // Action vector to apply for this step.
    repeated float actions = 2;
    // Optional timeout in seconds for the physics step. 0 means use server default.
    float timeout_s = 3;
    // Optional camera snapshots to capture after the physics step.
    repeated GetCameraFrameRequest camera_requests = 4;
}

message StepResponse {
    bool success = 1;
    string message = 2;
    // Observation after the physics step completed.
    AgentFrame observation = 3;
    // Time taken for the physics step in microseconds (for profiling).
    uint64 physics_step_duration_us = 4;
    // Camera frames synchronized with the observation.
    repeated NamedImageFrame camera_frames = 5;

    // === Enriched fields (populated when a negotiated task session is active) ===

    // Engine-computed reward signals, keyed by reward term name.
    // Values are raw (unweighted) scalar signals.
    map<string, float> reward_signals = 6;
    // True if a hard termination condition was triggered (episode failure).
    bool terminated = 7;
    // True if the episode was truncated (e.g., time limit).
    bool truncated = 8;
    // Auxiliary info for diagnostics and Python-side reward computation.
    map<string, float> info = 9;
    // Per-termination-term flags (which specific condition fired).
    map<string, bool> termination_flags = 10;
}

// =============================================================================
// Progress Reporting (client-to-server evaluation/training progress)
// =============================================================================

// Client-to-server progress report for evaluation/training runs.
// Lightweight and fire-and-forget — the client does not block on the response
// beyond confirming receipt.
message ProgressReport {
    string  run_id           = 1;   // Unique run identifier (e.g. UUID or task+timestamp)
    string  task_name        = 2;   // e.g. "piper_blockstacking"
    string  policy_name      = 3;   // e.g. "ACT", "PPO"
    string  phase            = 4;   // e.g. "connecting", "loading", "running", "complete"

    int32   current_episode  = 5;   // 1-based current episode
    int32   total_episodes   = 6;   // total planned episodes
    int32   current_step     = 7;   // 0-based step within current episode
    int32   max_steps        = 8;   // max steps per episode

    float   elapsed_s        = 9;   // wall-clock seconds since run started
    string  status_text      = 10;  // free-form status line (e.g. "Episode 3/10: step 250")

    bool    finished         = 11;  // true when the run is complete (triggers auto-clear after timeout)
}

message ProgressAck {
    bool accepted = 1;
}

// =============================================================================
// Task Contract System
// =============================================================================

// Task contract: declarative MDP specification sent from Python to engine.
message TaskContract {
    string task_id = 1;
    string robot = 2;
    string scene = 3;
    ObservationContract observations = 4;
    ActionContract actions = 5;
    RewardContract rewards = 6;
    TerminationContract terminations = 7;
    RandomizationContract randomization = 8;
    repeated AuxiliaryDataRequest auxiliary_data = 9;
}

message ObservationContract {
    repeated ObservationTermRequest required = 1;
    repeated ObservationTermRequest optional = 2;
}

message ObservationTermRequest {
    string name = 1;
    map<string, string> params = 2;
    string group = 3;
}

message ActionContract {
    repeated ActionTermRequest terms = 1;
}

message ActionTermRequest {
    string type = 1;
    string joint_pattern = 2;
    map<string, string> params = 3;
}

message RewardContract {
    repeated RewardTermRequest engine_terms = 1;
    repeated string python_terms = 2;
}

message RewardTermRequest {
    string name = 1;
    float weight = 2;
    map<string, string> params = 3;
}

message TerminationContract {
    repeated TerminationTermRequest terms = 1;
}

message TerminationTermRequest {
    string name = 1;
    bool is_timeout = 2;
    map<string, string> params = 3;
}

message RandomizationContract {
    bytes simulation_contract_bytes = 1;
    repeated CustomRandomization custom_randomizations = 2;
}

message CustomRandomization {
    string name = 1;
    float range_min = 2;
    float range_max = 3;
    string target = 4;
}

message AuxiliaryDataRequest {
    string name = 1;
    map<string, string> params = 2;
}

// Capability manifest: describes available MDP components.
message EngineCapabilityManifest {
    string engine_version = 1;
    int32 manifest_version = 2;
    repeated MdpComponentDescriptor observations = 3;
    repeated MdpComponentDescriptor actions = 4;
    repeated MdpComponentDescriptor rewards = 5;
    repeated MdpComponentDescriptor terminations = 6;
    repeated MdpRandomizationDescriptor randomizations = 7;
    repeated MdpComponentDescriptor auxiliary_data = 8;
    MdpRobotInfo robot_info = 9;
}

message MdpComponentDescriptor {
    string name = 1;
    string description = 2;
    string category = 3;
    map<string, MdpParamDescriptor> params_schema = 4;
    repeated int32 output_shape = 5;
    repeated string requires = 6;
    repeated string robot_types = 7;
}

message MdpParamDescriptor {
    string type = 1;
    string default_value = 2;
    string description = 3;
    float range_min = 4;
    float range_max = 5;
    bool has_range = 6;
}

message MdpRandomizationDescriptor {
    MdpComponentDescriptor base = 1;
    float default_range_min = 2;
    float default_range_max = 3;
    string engine_target = 4;
}

message MdpRobotInfo {
    string name = 1;
    repeated string joint_names = 2;
    repeated string actuator_names = 3;
    repeated MdpActuatorLimit actuator_limits = 4;
    repeated string body_names = 5;
    repeated string site_names = 6;
    repeated string sensor_names = 7;
    repeated string available_scenes = 8;
}

message MdpActuatorLimit {
    float lower = 1;
    float upper = 2;
    float default_value = 3;
    float scale = 4;
}

// Contract validation result.
message ContractValidationResult {
    bool is_valid = 1;
    TaskContract negotiated_contract = 2;
    repeated ContractValidationMessage errors = 3;
    repeated ContractValidationMessage warnings = 4;
    repeated string resolved_optionals = 5;
    repeated string unresolved_optionals = 6;
}

message ContractValidationMessage {
    string severity = 1;
    string component = 2;
    string term_name = 3;
    string message = 4;
    string suggestion = 5;
}

// Negotiated session handle.
message NegotiatedTaskSession {
    string session_id = 1;
    TaskContract resolved_contract = 2;
    repeated ObservationSlot observation_layout = 3;
    repeated string reward_terms = 4;
    repeated string termination_terms = 5;
}

message ObservationSlot {
    string name = 1;
    string group = 2;
    int32 offset = 3;
    int32 size = 4;
}

// Task contract RPC messages.
message GetCapabilityManifestRequest {
    string robot_name = 1;
    string scene = 2;
}

message GetCapabilityManifestResponse {
    EngineCapabilityManifest manifest = 1;
}

message ValidateTaskContractRequest {
    TaskContract contract = 1;
}

message ValidateTaskContractResponse {
    ContractValidationResult result = 1;
}

message NegotiateTaskRequest {
    TaskContract contract = 1;
}

message NegotiateTaskResponse {
    bool success = 1;
    string message = 2;
    NegotiatedTaskSession session = 3;
    ContractValidationResult validation = 4;
}

// Per-agent RL-style observation streaming (training / inference clients consume this).
service AgentService {
    rpc GetAgentSchema(GetAgentSchemaRequest) returns (GetAgentSchemaResponse);
    // Single-shot observation snapshot (unified observation surface).
    rpc GetObservation(GetObservationRequest) returns (GetObservationResponse);
    // Server-streaming observations (and optional action echo) for a single agent.
    //
    // The client specifies which agent to stream via StreamAgentRequest and may
    // provide a target FPS hint. Actions are currently sent via MujocoService
    // (SendControl); AgentFrame.actions is primarily used for telemetry.
    rpc StreamAgent(StreamAgentRequest) returns (stream AgentFrame);
    // Reset a specific agent (full reset: clear buffers, reset state, resample commands, apply MuJoCo state).
    // Useful for multi-env RL where individual agents need to be reset without resetting the entire scene.
    rpc ResetAgent(ResetAgentRequest) returns (ResetAgentResponse);
    // Synchronous RL step: apply action, wait for physics, return observation.
    // This is the recommended interface for RL training as it eliminates
    // one network round-trip compared to separate SendControl + GetObservation.
    rpc Step(StepRequest) returns (StepResponse);
    // Report evaluation/training progress from an external client.
    // Fire-and-forget: the server stores the latest report for UI display.
    rpc ReportProgress(ProgressReport) returns (ProgressAck);
    // Discover available MDP components for a robot/scene.
    rpc GetCapabilityManifest(GetCapabilityManifestRequest) returns (GetCapabilityManifestResponse);
    // Validate a task contract against engine capabilities.
    rpc ValidateTaskContract(ValidateTaskContractRequest) returns (ValidateTaskContractResponse);
    // Validate + configure engine for the contract. Returns session handle.
    rpc NegotiateTask(NegotiateTaskRequest) returns (NegotiateTaskResponse);
}
